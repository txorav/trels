<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trels Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="auth-view" class="view-container active">
        <div class="card auth-card">
            <div class="card-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access the Trels Admin Panel.</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="view-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
                <h2>Trels</h2>
            </div>
            <nav>
                <a href="#" class="nav-item active">Port Mappings</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-ghost">Log Out</button>
            </div>
        </aside>
        
        <main class="content">
            <header class="content-header">
                <h1>Port Mappings</h1>
                <button id="add-record-btn" class="btn btn-primary">Add New Mapping</button>
            </header>

            <div class="table-container">
                <table id="dns-table">
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Local Port</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dns-tbody">
                        <!-- Records will be injected here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for adding record -->
    <div id="add-modal" class="modal">
        <div class="modal-content card">
            <div class="card-header">
                <h2>Add Mapping</h2>
                <p>Map a custom domain to a local port.</p>
            </div>
            <form id="add-record-form">
                <div class="input-group">
                    <label for="record-domain">Domain (e.g. app.local)</label>
                    <input type="text" id="record-domain" placeholder="app.local" required>
                </div>
                <div class="input-group">
                    <label for="record-port">Target Local Port</label>
                    <input type="number" id="record-port" placeholder="3000" required min="1" max="65535">
                </div>
                <div class="input-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="record-enabled" checked style="width: auto;">
                        Enable mapping immediately
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" id="close-modal-btn" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Mapping</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>

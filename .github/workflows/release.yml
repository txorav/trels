name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Download Dependencies
        run: |
          cd backend
          go mod tidy
          
      - name: Build Linux Binary
        run: |
          mkdir -p build/bin
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -v -o ../build/bin/trels main.go
          
      - name: Build Windows Binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -H=windowsgui" -v -o ../build/bin/trels.exe main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/trels
            build/bin/trels.exe

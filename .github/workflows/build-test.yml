name: Go Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.21']

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Navigate and Fetch Dependencies
      run: |
        cd backend
        go mod tidy

    - name: Run Tests
      run: |
        cd backend
        go test -v ./...

    - name: Verify Build
      run: |
        cd backend
        go build -v -o trels-binary main.go
